<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会籍卡开通 · 协议确认弹窗演示</title>
  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f3e5ab;
      --gold-dark: #b8860b;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #111111;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border: #eeeeee;
      --danger: #ff4d4f;
      --success: #52c41a;
      --black: #000000;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px 140px;
      min-height: 100vh;
    }

    /* 顶部用户信息 */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c68b59 0%, #2d6b6b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      position: absolute;
      top: 8px;
    }

    .user-meta { flex: 1; }
    .user-meta h2 { margin: 0; font-size: 18px; font-weight: 600; }
    .user-meta p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .renew-btn {
      padding: 7px 14px;
      border-radius: 999px;
      border: none;
      background: var(--black);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    /* 会籍卡 */
    .card {
      background: var(--black);
      border-radius: var(--radius);
      padding: 24px;
      color: #fff;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .card::before {
      content: '';
      position: absolute;
      right: -60px;
      top: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.12);
    }

    .card::after {
      content: '';
      position: absolute;
      right: -20px;
      bottom: -20px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card-brand {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .card-brand span {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0;
      margin-left: 8px;
      opacity: 0.9;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 13px;
      opacity: 0.65;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 16px;
      font-weight: 600;
    }

    .card-price {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: flex-start;
    }

    .card-price small {
      font-size: 16px;
      font-weight: 500;
      margin-top: 6px;
      margin-right: 2px;
    }

    /* 选择套餐 */
    .section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px;
    }

    .plan-options {
      display: flex;
      gap: 10px;
    }

    .plan {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 8px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      background: #fff;
    }

    .plan.active {
      border-color: var(--black);
      background: #fafafa;
    }

    .plan-badge {
      position: absolute;
      top: -1px;
      left: -1px;
      padding: 3px 8px;
      background: var(--black);
      color: #fff;
      font-size: 10px;
      border-radius: var(--radius-sm) 0 var(--radius-sm) 0;
    }

    .plan-price-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 2px;
      margin-bottom: 4px;
    }

    .plan-price {
      font-size: 24px;
      font-weight: 700;
    }

    .plan-price small { font-size: 12px; font-weight: 500; }

    .plan-original {
      font-size: 11px;
      color: var(--text-tertiary);
      text-decoration: line-through;
      margin-right: 4px;
    }

    .plan-discount {
      display: inline-block;
      font-size: 10px;
      color: #fff;
      background: #ff7a45;
      padding: 1px 4px;
      border-radius: 4px;
    }

    .plan-name {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .plan-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plan.active .plan-check {
      background: var(--black);
      border-color: var(--black);
      color: #fff;
      font-size: 10px;
    }

    .section-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 12px;
      line-height: 1.6;
    }

    /* 会籍权益 */
    .benefits-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .benefits-title-row h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .benefits-tag {
      font-size: 11px;
      color: #fff;
      background: var(--black);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .benefit-item {
      text-align: center;
      padding: 12px 4px;
      border-radius: 10px;
      background: #fafafa;
    }

    .benefit-icon {
      width: 32px;
      height: 32px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--border);
      font-size: 16px;
    }

    .benefit-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .benefit-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* 权益横向对比 */
    .compare-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .compare-section h3 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 600;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .compare-table th,
    .compare-table td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .compare-table th:first-child,
    .compare-table td:first-child {
      text-align: left;
      padding-left: 0;
    }

    .compare-table th {
      color: var(--text-secondary);
      font-weight: 500;
      background: #fafafa;
    }

    .compare-table .active-col {
      background: #fffbe6;
      color: var(--gold-dark);
      font-weight: 600;
    }

    .compare-table .yes { color: var(--success); font-weight: 600; }
    .compare-table .no { color: var(--text-tertiary); }

    /* 底部栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      z-index: 100;
    }

    .bottom-inner {
      max-width: 420px;
      margin: 0 auto;
    }

    .agree-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .agree-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 1px;
      accent-color: var(--black);
      flex-shrink: 0;
    }

    .agree-row a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: var(--black);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 420px;
      max-height: 88vh;
      border-radius: var(--radius) var(--radius) 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(20px);
      transition: transform 0.25s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      margin: 0 0 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #f9f9f9;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--black);
      color: #fff;
      border-color: var(--black);
    }

    .tab.done {
      background: #f6ffed;
      color: var(--success);
      border-color: #b7eb8f;
    }

    .tab-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .tab.active .tab-check { background: rgba(255,255,255,0.25); }
    .tab.done .tab-check { background: var(--success); color: #fff; }

    .progress {
      height: 2px;
      background: var(--border);
      margin: 0 20px 12px;
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.3s;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 16px;
      background: #fafafa;
      -webkit-overflow-scrolling: touch;
    }

    .agreement-content {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 18px;
      font-size: 14px;
      line-height: 1.8;
      color: #444;
      max-height: 42vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    .agreement-content h4 {
      margin-top: 0;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 16px;
    }

    .agreement-content p { margin: 12px 0; }
    .agreement-content strong { color: var(--text); }

    .scroll-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 8px;
      color: #ad8b00;
      font-size: 12px;
    }

    .scroll-hint.completed {
      background: #f6ffed;
      border-color: #b7eb8f;
      color: var(--success);
    }

    .modal-footer {
      padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions .btn-primary {
      flex: 2;
      white-space: nowrap;
      font-size: 15px;
      padding: 14px 18px;
    }

    .modal-actions .btn-secondary {
      flex: 1;
      padding: 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .multi-progress-text {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 12px;
    }

    .multi-progress-text strong {
      color: var(--gold-dark);
      font-weight: 600;
    }

    .btn-primary:disabled {
      opacity: 1;
      background: #f5f5f7;
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    .btn-primary.done {
      background: var(--success);
    }

    .notice {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page">
    <!-- 用户信息 -->
    <div class="user-bar">
      <div class="avatar">A</div>
      <div class="user-meta">
        <h2>Adam</h2>
        <p>有效期至 2026/01/01<br/>下期将于 2026/02/01 自动续费</p>
      </div>
      <button class="renew-btn">续费管理</button>
    </div>

    <!-- 会籍卡 -->
    <div class="card">
      <div class="card-brand">SAVAGE <span>会员卡</span></div>
      <div class="card-row">
        <div>
          <div class="card-label">已选套餐</div>
          <div class="card-value" id="card-plan-name">单月购买</div>
          <div class="card-label" style="margin-top: 20px;">有效期</div>
          <div class="card-value" id="card-validity">30 天</div>
        </div>
        <div class="card-price"><small>¥</small><span id="card-price">19</span></div>
      </div>
    </div>

    <!-- 套餐选择 -->
    <div class="section">
      <h3 class="section-title">选择会籍性质</h3>
      <div class="plan-options" id="plan-options"></div>
      <p class="section-desc" id="plan-desc">到期后按每月¥30原价自动续费，可随时取消自动续费，优惠仅限1次，购买后立即生效。</p>
    </div>

    <!-- 会籍权益 -->
    <div class="section">
      <div class="benefits-title-row">
        <h3 id="benefits-title">单月购买</h3>
        <span class="benefits-tag">专属权益</span>
      </div>
      <div class="benefits-grid" id="benefits-grid"></div>
    </div>

    <!-- 权益横向对比 -->
    <div class="compare-section">
      <h3>权益对比</h3>
      <table class="compare-table">
        <thead>
          <tr>
            <th>权益</th>
            <th id="col-0">单月购买</th>
            <th id="col-1">连续包月</th>
            <th id="col-2">年签月付</th>
          </tr>
        </thead>
        <tbody id="compare-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="agree-row">
        <input type="checkbox" id="main-agree" />
        <label for="main-agree">
          阅读并确认
          <a href="#" onclick="openMultiAgreement(); return false;">《会员服务协议》</a>
          和
          <a href="#" onclick="openMultiAgreement(); return false;">《自动续费协议》</a>
        </label>
      </div>
      <button class="btn-primary" id="open-btn" disabled onclick="openMultiAgreement()">确认开通 ¥19.00(已省¥11)</button>
    </div>
  </div>

  <!-- 多协议 Modal -->
  <div class="modal-overlay" id="modal-multi" onclick="closeOnBackdrop(event, 'modal-multi')">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">请阅读并同意以下协议</h2>
        <div class="tabs" id="tabs"></div>
      </div>
      <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="modal-body" id="multi-body"></div>
      <div class="modal-footer">
        <div class="multi-progress-text" id="multi-progress-text">已同意 0/4 项协议</div>
        <div class="modal-actions">
          <button class="btn-secondary" id="multi-prev" onclick="prevTab()">取消</button>
          <button class="btn-primary" id="multi-action" onclick="handleMultiAction()">同意《会员服务协议》</button>
        </div>
        <p class="notice" id="multi-notice">点击按钮即表示您已阅读并同意当前协议。</p>
      </div>
    </div>
  </div>

  <script>
    // ===================== 页面数据 =====================
    const plans = [
      {
        id: 'single',
        name: '单月购买',
        price: 19,
        originalPrice: 30,
        discount: '已省¥11',
        badge: null,
        validity: '30 天',
        desc: '到期后按每月¥30原价自动续费，可随时取消自动续费，优惠仅限1次，购买后立即生效。',
        benefits: [
          { icon: '👥', title: '团课权益', desc: '无限次约团课' },
          { icon: '📍', title: '通用权益', desc: '全国门店通用' },
          { icon: '🏷️', title: '折扣权益', desc: '训练营享折扣' }
        ]
      },
      {
        id: 'monthly',
        name: '连续包月',
        price: 599,
        originalPrice: 30,
        discount: '已优惠11元',
        badge: '首次特惠',
        validity: '30 天',
        desc: '首次开通享特惠价，到期后按原价自动续费，可随时取消。',
        benefits: [
          { icon: '👥', title: '团课权益', desc: '无限次约团课' },
          { icon: '📍', title: '通用权益', desc: '全国门店通用' },
          { icon: '🏷️', title: '折扣权益', desc: '训练营享折扣' },
          { icon: '🎁', title: '活动权益', desc: '专属活动权益' }
        ]
      },
      {
        id: 'yearly',
        name: '年签月付',
        price: 499,
        originalPrice: 429,
        discount: '已优惠30元',
        badge: '仅1元/天',
        validity: '365 天 / 期（月付）',
        desc: '签约年卡按月付款，享受全年最完整权益，可随时取消自动续费。',
        benefits: [
          { icon: '👥', title: '团课权益', desc: '无限次约团课' },
          { icon: '📍', title: '通用权益', desc: '全国门店通用' },
          { icon: '🏷️', title: '折扣权益', desc: '训练营享折扣' },
          { icon: '🎁', title: '活动权益', desc: '专属活动权益' },
          { icon: '📉', title: '阶梯权益', desc: '阶梯式降价' },
          { icon: '💳', title: '储值权益', desc: '储值享九五折' }
        ]
      }
    ];

    const allBenefitKeys = ['团课权益', '通用权益', '折扣权益', '活动权益', '阶梯权益', '储值权益'];
    const benefitDescs = {
      '团课权益': '无限次约团课',
      '通用权益': '全国门店通用',
      '折扣权益': '训练营享折扣',
      '活动权益': '专属活动权益',
      '阶梯权益': '阶梯式降价',
      '储值权益': '储值享九五折'
    };

    let selectedPlan = 0;

    function renderPlans() {
      const container = document.getElementById('plan-options');
      container.innerHTML = plans.map((plan, i) => {
        const active = i === selectedPlan;
        return `
          <div class="plan ${active ? 'active' : ''}" onclick="selectPlan(${i})">
            ${plan.badge ? `<div class="plan-badge">${plan.badge}</div>` : ''}
            <div class="plan-check">${active ? '✓' : ''}</div>
            <div class="plan-price-wrap">
              <span class="plan-price"><small>¥</small>${plan.price}</span>
            </div>
            <div>
              ${plan.originalPrice ? `<span class="plan-original">¥${plan.originalPrice}</span>` : ''}
              <span class="plan-discount">${plan.discount}</span>
            </div>
            <div class="plan-name">${plan.name}</div>
          </div>
        `;
      }).join('');
    }

    function renderBenefits() {
      const plan = plans[selectedPlan];
      document.getElementById('benefits-title').textContent = plan.name;
      document.getElementById('benefits-grid').innerHTML = plan.benefits.map(b => `
        <div class="benefit-item">
          <div class="benefit-icon">${b.icon}</div>
          <div class="benefit-title">${b.title}</div>
          <div class="benefit-desc">${b.desc}</div>
        </div>
      `).join('');
    }

    function renderCompare() {
      const tbody = document.getElementById('compare-body');
      document.getElementById('col-0').className = selectedPlan === 0 ? 'active-col' : '';
      document.getElementById('col-1').className = selectedPlan === 1 ? 'active-col' : '';
      document.getElementById('col-2').className = selectedPlan === 2 ? 'active-col' : '';

      tbody.innerHTML = allBenefitKeys.map(key => {
        const cells = plans.map((plan, i) => {
          const has = plan.benefits.some(b => b.title === key);
          const active = i === selectedPlan;
          return `<td class="${active ? 'active-col' : ''}">
            <span class="${has ? 'yes' : 'no'}">${has ? '✓' : '—'}</span>
          </td>`;
        }).join('');
        return `
          <tr>
            <td>${key}<br/><span style="color:var(--text-tertiary);font-size:11px;">${benefitDescs[key]}</span></td>
            ${cells}
          </tr>
        `;
      }).join('');
    }

    function updatePage() {
      const plan = plans[selectedPlan];
      document.getElementById('card-plan-name').textContent = plan.name;
      document.getElementById('card-validity').textContent = plan.validity;
      document.getElementById('card-price').textContent = plan.price;
      document.getElementById('plan-desc').textContent = plan.desc;
      document.getElementById('open-btn').textContent = `确认开通 ¥${plan.price}.00(${plan.discount})`;
      renderPlans();
      renderBenefits();
      renderCompare();
    }

    function selectPlan(i) {
      selectedPlan = i;
      updatePage();
    }

    document.getElementById('main-agree').addEventListener('change', function() {
      document.getElementById('open-btn').disabled = !this.checked;
    });

    // ===================== 多协议 Tab =====================
    const agreements = [
      {
        title: '会员服务协议',
        content: `
          <h4>会员服务协议</h4>
          <p>欢迎您申请开通 SAVAGE 会籍卡。本协议约定甲方（SAVAGE 健身）与乙方（会员）之间的权利义务关系。</p>
          <p><strong>一、服务内容</strong></p>
          <p>甲方依据您购买的会籍卡类型，向您提供健身场馆使用、团课预约、私教服务预约、储物柜使用等会员服务。</p>
          <p><strong>二、使用规则</strong></p>
          <p>会籍卡仅限乙方本人使用，不得转借、转让、冒用。一经发现，甲方有权暂停或终止服务，且不予退款。</p>
          <p><strong>三、免责条款</strong></p>
          <p>乙方充分了解健身运动具有一定风险，自愿承担因运动可能导致的身体不适、受伤等风险。</p>
          <p>甲方保留因场馆维护、设备升级、不可抗力等原因临时调整服务时间或项目的权利。</p>
        `
      },
      {
        title: '隐私政策',
        content: `
          <h4>隐私政策</h4>
          <p>SAVAGE 健身重视您的个人信息保护。本政策说明我们如何收集、使用、存储和共享您的个人信息。</p>
          <p><strong>一、信息收集</strong></p>
          <p>我们可能会收集您的姓名、手机号、身份证信息、人脸特征、健康问卷、消费记录、运动数据等信息。</p>
          <p><strong>二、信息使用</strong></p>
          <p>我们使用上述信息为您提供会员服务、进行身份核验、会员管理、风险防控及改善服务质量。</p>
          <p><strong>三、信息共享</strong></p>
          <p>未经您的单独同意，我们不会向第三方共享您的个人信息，但法律法规另有规定的除外。</p>
          <p><strong>四、信息保护</strong></p>
          <p>我们采用加密存储、访问控制、安全审计等技术措施保护您的个人信息安全。</p>
        `
      },
      {
        title: '自动续费协议',
        content: `
          <h4>自动续费协议</h4>
          <p>本协议是您（乙方）就 SAVAGE 会籍卡自动续费服务与甲方（SAVAGE 健身）达成的约定。</p>
          <p><strong>一、授权范围</strong></p>
          <p>您授权甲方在会籍卡到期前，通过您预留的支付渠道扣除下一期会籍费用，以实现服务连续使用。</p>
          <p><strong>二、扣款时间</strong></p>
          <p>扣款通常会在会籍到期前 1-3 日发起，具体以支付渠道实际扣款时间为准。</p>
          <p><strong>三、取消方式</strong></p>
          <p>您可随时通过“会员中心 → 我的会籍 → 自动续费管理”关闭自动续费。关闭后下一周期不再扣款。</p>
          <p><strong>四、扣款失败</strong></p>
          <p>如因余额不足、支付渠道异常等原因导致扣款失败，甲方将在合理期限内再次尝试扣款或通知您处理。</p>
        `
      },
      {
        title: '风险提示书',
        content: `
          <h4>运动风险提示书</h4>
          <p>健身运动具有一定的身体负荷和风险，请您在参与前充分评估自身健康状况。</p>
          <p><strong>一、高风险人群</strong></p>
          <p>患有心脏病、高血压、糖尿病、哮喘、传染病、骨折未愈、孕期及产后恢复期等情况的人员，应在专业医生指导下参与运动。</p>
          <p><strong>二、运动安全</strong></p>
          <p>请在使用器械前了解正确使用方法，必要时咨询现场教练。请勿超负荷训练或违反安全规范操作。</p>
          <p><strong>三、突发情况</strong></p>
          <p>如在运动过程中感到头晕、胸闷、呼吸困难、关节疼痛等不适，请立即停止运动并寻求帮助。</p>
          <p><strong>四、责任声明</strong></p>
          <p>乙方自愿承担因自身健康状况、运动行为或违反安全规范导致的一切后果，甲方已尽到合理提示义务。</p>
        `
      }
    ];

    let currentTab = 0;
    const agreedSet = new Set();

    function openMultiAgreement() {
      currentTab = 0;
      agreedSet.clear();
      renderTabs();
      renderContent();
      updateMultiState();
      openModal('modal-multi');
    }

    function renderTabs() {
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = agreements.map((a, i) => {
        const done = agreedSet.has(i);
        const active = i === currentTab;
        let cls = 'tab';
        if (active) cls += ' active';
        else if (done) cls += ' done';
        return `
          <button class="${cls}" onclick="switchTab(${i})">
            <span class="tab-check">${done ? '✓' : (i + 1)}</span>
            ${a.title}
          </button>
        `;
      }).join('');
    }

    function renderContent() {
      document.getElementById('multi-body').innerHTML = `
        <div class="agreement-content">${agreements[currentTab].content}</div>
      `;
    }

    function switchTab(i) {
      currentTab = i;
      renderTabs();
      renderContent();
      updateMultiState();
    }

    function updateMultiState() {
      const checked = agreedSet.has(currentTab);
      const allAgreed = agreements.every((_, i) => agreedSet.has(i));
      const progress = (agreedSet.size / agreements.length) * 100;

      document.getElementById('progress-bar').style.width = progress + '%';
      document.getElementById('multi-progress-text').innerHTML =
        `已同意 <strong>${agreedSet.size}</strong>/${agreements.length} 项协议`;

      const prevBtn = document.getElementById('multi-prev');
      prevBtn.textContent = currentTab === 0 ? '取消' : '上一步';

      const actionBtn = document.getElementById('multi-action');
      actionBtn.classList.remove('done');

      if (allAgreed) {
        actionBtn.textContent = '同意并开通';
        actionBtn.disabled = false;
      } else if (checked) {
        actionBtn.textContent = `已同意《${agreements[currentTab].title}》`;
        actionBtn.disabled = true;
        actionBtn.classList.add('done');
      } else {
        actionBtn.textContent = `同意《${agreements[currentTab].title}》`;
        actionBtn.disabled = false;
      }
    }

    function handleMultiAction() {
      const allAgreed = agreements.every((_, i) => agreedSet.has(i));
      if (allAgreed) {
        alert('所有协议已同意，会籍卡开通流程继续');
        closeModal('modal-multi');
        return;
      }

      agreedSet.add(currentTab);
      renderTabs();

      const next = agreements.findIndex((_, i) => !agreedSet.has(i));
      if (next !== -1) {
        currentTab = next;
        renderTabs();
        renderContent();
      }
      updateMultiState();
    }

    function prevTab() {
      if (currentTab === 0) {
        closeModal('modal-multi');
      } else {
        currentTab--;
        renderTabs();
        renderContent();
        updateMultiState();
      }
    }

    function confirmMulti() {
      if (!agreements.every((_, i) => agreedSet.has(i))) return;
      alert('所有协议已同意，会籍卡开通流程继续');
      closeModal('modal-multi');
    }

    // ===================== 通用 Modal 控制 =====================
    function openModal(id) {
      const el = document.getElementById(id);
      el.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
      const el = document.getElementById(id);
      el.classList.remove('active');
      document.body.style.overflow = '';
    }

    function closeOnBackdrop(event, id) {
      if (event.target.id === id) closeModal(id);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal('modal-multi');
    });

    // 初始化
    updatePage();
  </script>
</body>
</html>
